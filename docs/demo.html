<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiHK.AI Demo — Live Neuromodulation</title>
    <meta name="description" content="Interactive demo of REAL architectural neuromodulation on a live LLM">
    <link rel="icon" type="image/png" href="pihkai.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: 'Times New Roman', Times, serif; background-color: #000; color: #CCC; display: flex; flex-direction: column; }
        header { background-color: #1a1a1a; border-bottom: 2px solid #333; padding: 12px 0; flex: 0 0 auto; }
        .header-content { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: bold; color: #FFF; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo img { height: 28px; width: auto; }
        .logo:hover { color: #00CCFF; }
        nav { display: flex; gap: 20px; flex-wrap: wrap; }
        nav a { color: #CCC; text-decoration: none; font-size: 13px; }
        nav a:hover { color: #FFF; }
        .demo-frame { flex: 1 1 auto; width: 100%; border: 0; display: block; }
        .fallback { padding: 12px; text-align: center; font-size: 13px; color: #888; flex: 0 0 auto; }
        .fallback a { color: #00CCFF; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo"><img src="pihkai.png" alt="PiHK.AI Logo"> PiHK.AI</a>
            <nav>
                <a href="index.html">Home</a>
                <a href="demo.html">Demo</a>
                <a href="https://neuromod-chat.passthebuck.workers.dev/" target="_blank" rel="noopener">Open in new tab ↗</a>
                <a href="https://github.com/cneckar/neuromod-llm-poc">GitHub</a>
            </nav>
        </div>
    </header>

    <!-- The live demo (drag-and-drop pillbox + real steered generation) is served by the Cloudflare
         Worker, which fronts the RunPod endpoint and keeps all keys server-side. We embed it here. -->
    <iframe class="demo-frame"
            src="https://neuromod-chat.passthebuck.workers.dev/"
            title="PiHK.AI Live Neuromodulation Lab"
            allow="clipboard-write"></iframe>

    <div class="fallback">
        Not loading? Open the demo directly at
        <a href="https://neuromod-chat.passthebuck.workers.dev/" target="_blank" rel="noopener">neuromod-chat.passthebuck.workers.dev</a>.
    </div>
</body>
</html>
