name = "neuromod-chat"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Bundle the demo UI (src/index.html) as a text module so `import INDEX_HTML from "./index.html"`
# works — the whole page is served from GET /.
[[rules]]
type = "Text"
globs = ["**/*.html"]

# Secrets — set with `wrangler secret put <NAME>` (NOT committed, NOT sent to the browser):
#   wrangler secret put RUNPOD_API_KEY            # required: RunPod API key (both endpoints)
#   wrangler secret put RUNPOD_ENDPOINT_ID_PRO    # the gated gpt-oss-120b endpoint id
#   wrangler secret put UNLOCK_KEY                # the secret that unlocks the PRO tier via /?k=<key>
#   wrangler secret put API_KEY                   # optional: gate the whole demo behind a client key
#
# Tier switch: everyone gets RUNPOD_ENDPOINT_ID (the default, below). Visiting `/?k=<UNLOCK_KEY>`
# sets an httpOnly cookie and routes that browser to RUNPOD_ENDPOINT_ID_PRO. The PRO endpoint id
# and the unlock key live ONLY in the secrets above — never in this file, the served HTML, or JS.
[vars]
RUNPOD_ENDPOINT_ID = "s80vaajr36l8ow"      # DEFAULT (public) endpoint — llama-8b
ALLOW_ORIGIN = "*"
POLL_MS = "300"
# Optional: override the pack list returned by /api/packs (the UI has its own built-in catalog).
# PACKS = "none,lsd,dmt,cocaine,mdma"
