name = "neuromod-chat"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Bundle the demo UI (src/index.html) as a text module so `import INDEX_HTML from "./index.html"`
# works — the whole page is served from GET /.
[[rules]]
type = "Text"
globs = ["**/*.html"]

# Public, non-secret vars. Secrets (RUNPOD_API_KEY, API_KEY) are set with:
#   wrangler secret put RUNPOD_API_KEY
#   wrangler secret put API_KEY            # optional client auth; omit to run open (dev only)
[vars]
RUNPOD_ENDPOINT_ID = "g2k8ksimt4lifv"      # <-- your RunPod Serverless endpoint id
ALLOW_ORIGIN = "*"
POLL_MS = "300"
# Optional: override the pack list returned by /api/packs (the UI has its own built-in catalog).
# PACKS = "none,lsd,dmt,cocaine,mdma"
