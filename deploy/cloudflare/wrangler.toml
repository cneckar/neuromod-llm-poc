name = "neuromod-chat"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Public, non-secret vars. Secrets (RUNPOD_API_KEY, API_KEY) are set with:
#   wrangler secret put RUNPOD_API_KEY
#   wrangler secret put API_KEY            # client auth; omit to run open (dev only)
[vars]
RUNPOD_ENDPOINT_ID = "<your-runpod-serverless-endpoint-id>"
ALLOW_ORIGIN = "*"
POLL_MS = "300"
# Optional: override the pack list shown in the UI (comma-separated).
# PACKS = "none,lsd,dmt,cocaine,mdma"
