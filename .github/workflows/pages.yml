name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build website
        run: |
          # The site lives directly in docs/ (index.html, effects.html, packs.html,
          # reference-data.js, chat.html, 404.html, CNAME, sitemap.xml, robots.txt, assets).
          # NOTE: this used to copy docs/website/*, which no longer exists — that made every
          # deploy fail, so the live site went stale. Publish the real docs/ tree instead.
          mkdir -p _site
          cp -r docs/. _site/
          # Don't publish the in-repo Markdown docs as raw pages at the site root.
          find _site -maxdepth 1 -name '*.md' -delete
          # Fail loudly if the expected pages didn't make it in.
          for f in index.html effects.html packs.html reference-data.js chat.html 404.html CNAME; do
            test -f "_site/$f" || { echo "MISSING _site/$f"; exit 1; }
          done
          echo "Published files:"; ls -la _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    # Only publish to production Pages on a real push to main — PR builds just validate.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
